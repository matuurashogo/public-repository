name: Deploy TradeBook to GitHub Pages

# アプリ実体は TradeBook/ サブフォルダにあるため、GitHub Pages の
# 「ブランチから配信（ルート/ docs のみ可）」では配信できない。
# そこで Actions で TradeBook/ をアーティファクトとしてアップロードし、
# サイトのルートとして配信する。これによりアプリ内の相対パス・PWA
# （sw.js / manifest.webmanifest）は無改変で動作する。
#
# 有効化手順: リポジトリ Settings → Pages → Build and deployment →
#             Source を「GitHub Actions」に設定する。

on:
  push:
    branches: [main]
    paths:
      - "TradeBook/**"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは1つに制限（進行中はキャンセルしない）。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # update-prices.yml はデータを push した直後に本ワークフローを
          # workflow_dispatch で起動する。dispatch の ref 解決が push 伝播より
          # 速いと、checkout 既定（dispatch 時の head_sha）では push 前の旧
          # コミットを取得してしまい、ライブが旧データのまま固定される（実害発生）。
          # そこで ref を main 明示にして、ジョブ実行時点の main 先端（＝最新
          # データ）を必ず取得する。push トリガー時も main 先端と同一で無害。
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload TradeBook/ as site root
        uses: actions/upload-pages-artifact@v3
        with:
          path: TradeBook

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
