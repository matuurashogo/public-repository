<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#ffffff" />
  <title>TradeBook — 損益計算</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="header">
    <h1>TradeBook</h1>
    <div id="sync" class="sync"><span class="dot"></span><span id="sync-text">未サインイン</span></div>
  </header>

  <!-- サインイン導線 -->
  <div id="signin-bar" class="signin-bar">
    <button id="signin-btn" class="signin-btn">Googleでサインインして最新と同期</button>
    <p id="signin-note" class="signin-note"></p>
  </div>

  <!-- 入力警告バナー（保有超過売却など） -->
  <div id="warn-banner" class="warn-banner hidden" role="alert"></div>

  <!-- 損益サマリー -->
  <section class="card">
    <div class="card-title">損益サマリー</div>
    <div class="seg" id="seg" role="group" aria-label="集計軸の切り替え">
      <button data-axis="year" aria-pressed="false">年間</button>
      <button data-axis="month" class="active" aria-pressed="true">月間</button>
      <button data-axis="code" aria-pressed="false">銘柄別</button>
    </div>
    <div class="summary-main">
      <div class="label" id="hero-label">税引後損益</div>
      <div class="value" id="hero-value">±0<span class="yen">円</span></div>
    </div>
    <div class="summary-sub">
      <div><div class="k">税引前</div><div class="v" id="hero-gross">±0</div></div>
      <div><div class="k">概算税(20.315%)</div><div class="v" id="hero-tax">0</div></div>
    </div>
    <table id="summary-table">
      <thead></thead>
      <tbody></tbody>
    </table>
    <p id="summary-note" class="summary-note"></p>
  </section>

  <!-- 保有銘柄 -->
  <section class="card">
    <div class="card-title">保有銘柄</div>
    <div class="table-scroll">
      <table id="holdings-table">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
    <p id="holdings-note" class="summary-note"></p>
  </section>

  <!-- トレード成績（KPI） -->
  <section class="card">
    <div class="card-title">トレード成績（KPI）<span class="card-sub">今年</span></div>
    <div id="kpi-grid" class="kpi-grid"></div>
    <div class="kpi-hist-label">損益分布</div>
    <div class="chart-wrap hist-wrap"><canvas id="hist-chart" role="img" aria-label="今年の売却ごとの実現損益の分布ヒストグラム"></canvas></div>
    <p id="kpi-empty" class="kpi-empty hidden">今年の売却がまだありません。売却を記録すると成績が表示されます。</p>
  </section>

  <!-- エントリー型別成績 -->
  <section class="card">
    <div class="card-title">エントリー型別成績</div>
    <label class="bd-axis-label">集計軸
      <select id="tag-axis" aria-label="型別成績の集計軸">
        <optgroup label="主観（自己申告タグ）">
          <option value="entry">入口タグ別</option>
          <option value="exit">出口タグ別</option>
        </optgroup>
        <optgroup label="客観（データ・要監視リスト）">
          <option value="dip">凹みの深さ別</option>
          <option value="vol">出来高急増別</option>
          <option value="trend">トレンド位置別</option>
          <option value="rsi">RSI（売られすぎ度）別</option>
          <option value="hv">ボラティリティ別</option>
        </optgroup>
      </select>
    </label>
    <div class="table-scroll">
      <table id="tag-breakdown-table">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
    <p id="tag-breakdown-note" class="summary-note"></p>
  </section>

  <!-- 客観データ未取得の銘柄（監視リスト不足の案内） -->
  <section class="card" id="missing-card" hidden>
    <div class="card-title">客観データ未取得の銘柄</div>
    <p class="summary-note" id="missing-note"></p>
    <div id="missing-list" class="missing-list"></div>
    <button type="button" id="missing-copy" class="btn-ghost missing-copy">コードをコピー</button>
  </section>

  <!-- 累積損益グラフ -->
  <section class="card">
    <div class="card-title">累積損益の推移</div>
    <div class="chart-wrap"><canvas id="cum-chart" role="img" aria-label="実現損益の累積推移の折れ線グラフ"></canvas></div>
  </section>

  <!-- 取引追加 -->
  <button id="add-toggle" class="add-btn">＋ 取引を追加</button>
  <section class="card form-card" id="form-card" hidden>
    <div class="card-title" id="form-title">取引を追加</div>
    <form id="trade-form">
      <div class="paste-import">
        <label>約定テキストを貼り付け（任意）
          <textarea id="f-paste" rows="2" placeholder="松井の「約定詳細」をLive Textでコピーして貼り付け → 自動入力"></textarea>
        </label>
        <button type="button" id="f-paste-btn" class="btn-ghost">解析して入力</button>
        <p id="f-paste-note" class="field-hint"></p>
      </div>
      <label>約定日<input type="date" id="f-date" required /></label>
      <label>銘柄を検索（社名・コード）
        <div class="suggest-wrap">
          <input type="search" id="f-search" inputmode="text" autocomplete="off" placeholder="トヨタ / 7203" />
          <ul id="suggest-list" class="suggest-list" hidden></ul>
        </div>
      </label>
      <label>銘柄コード
        <input type="text" id="f-code" inputmode="numeric" pattern="[0-9A-Za-z]{4}" maxlength="4" placeholder="7203" required />
        <span id="f-name" class="f-name"></span>
      </label>
      <div class="side-toggle" id="f-side">
        <button type="button" data-side="買" class="active">買</button>
        <button type="button" data-side="売">売</button>
      </div>
      <div class="holdings-picker" id="holdings-picker" hidden>
        <div class="hp-label">保有から選択（タップで銘柄・数量を入力）</div>
        <div class="hp-list" id="hp-list"></div>
      </div>
      <label>数量（株）<input type="number" id="f-qty" inputmode="numeric" min="1" step="1" placeholder="100" required /></label>
      <label>約定単価（円）<input type="number" id="f-price" inputmode="decimal" min="0" step="0.1" placeholder="2850" required /></label>
      <span class="field-label">口座区分</span>
      <div class="acct-toggle" id="f-account" role="group" aria-label="口座区分">
        <button type="button" data-acct="特定" class="active" aria-pressed="true">特定</button>
        <button type="button" data-acct="NISA" aria-pressed="false">NISA（非課税）</button>
      </div>
      <p class="field-hint">手数料は松井ボックスレートで自動計算（1日の約定代金合計で判定・50万円/日まで0円。NISAは無料）。</p>

      <!-- エントリー/手仕舞い根拠（売買で出し分け） -->
      <div id="entry-rationale" class="rationale">
        <span class="field-label">エントリー根拠（押し目の型）</span>
        <div class="tag-chips" id="entry-tags" role="group" aria-label="エントリー根拠タグ"></div>
        <label>メモ<textarea id="f-entry-note" rows="2" placeholder="なぜ買ったか（任意）"></textarea></label>
      </div>
      <div id="exit-rationale" class="rationale" hidden>
        <span class="field-label">手仕舞い根拠</span>
        <div class="tag-chips" id="exit-tags" role="group" aria-label="手仕舞い根拠タグ"></div>
        <label>メモ<textarea id="f-exit-note" rows="2" placeholder="なぜ売ったか（任意）"></textarea></label>
      </div>

      <div class="form-actions">
        <button type="button" id="form-cancel" class="btn-ghost">キャンセル</button>
        <button type="submit" id="form-submit" class="btn-primary">追加する</button>
      </div>
    </form>
  </section>

  <!-- 取引履歴 -->
  <section class="card">
    <div class="card-title">取引履歴</div>
    <div id="trade-list"></div>
    <p id="empty-note" class="empty-note">まだ取引がありません。「＋ 取引を追加」から記録を始めましょう。</p>
  </section>

  <!-- Chart.js（同梱・オフライン可） -->
  <script src="./js/vendor/chart.umd.min.js"></script>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- アプリ本体 -->
  <script type="module" src="./js/app.js"></script>
</body>
</html>
